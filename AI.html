<!DOCTYPE html>
<html lang="id">
<head>
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Memory QC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',system-ui;background:#e6f9fc;height:100vh;display:flex;justify-content:center;align-items:center;}
.app{width:100%;max-width:1000px;height:95vh;display:flex;flex-direction:column;background:#ffffff;border-radius:20px;box-shadow:0 10px 25px rgba(0,150,170,0.15);overflow:hidden;}
header{padding:18px 22px;background:#00bcd4;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:18px;color:white;}
header button{background:white;color:#00acc1;border:none;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:0.2s;}
header button:hover{background:#f0fdff;}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:#f4feff;}
#chat::-webkit-scrollbar{width:5px;}
#chat::-webkit-scrollbar-thumb{background:#b2ebf2;border-radius:10px;}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:translateY(0);}}
.msg.user{align-self:flex-end;background:#00bcd4;color:white;border-bottom-right-radius:6px;}
.msg.bot{align-self:flex-start;background:white;color:#333;border:1px solid #b2ebf2;border-bottom-left-radius:6px;}
.msg.bot .row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.msg.bot .label{font-weight:600;color:#00acc1;min-width:75px;}
.msg.bot .value{flex:1 1 100%;word-break:break-word;overflow-wrap:anywhere;}
.msg.bot a{word-break:break-all;overflow-wrap:anywhere;display:inline-block;max-width:100%;color:orange;text-decoration:underline;}
.input-area{padding:16px;background:white;border-top:1px solid #b2ebf2;display:flex;flex-direction:column;gap:10px;}
.input-area select,.input-area input[type="file"],.input-area textarea,.input-area input[type="datetime-local"]{width:100%;padding:10px 14px;border-radius:14px;border:1px solid #b2ebf2;font-size:14px;font-family:inherit;background:white;transition:0.2s;}
.input-area select:focus,.input-area textarea:focus,.input-area input[type="datetime-local"]:focus{outline:none;border-color:#00bcd4;}
textarea{resize:none;min-height:55px;max-height:120px;overflow-y:auto;}
.input-row{display:flex;gap:10px;flex-wrap:wrap;}
button.action{flex:1;padding:10px;border:none;border-radius:20px;font-weight:600;cursor:pointer;color:white;font-size:14px;transition:0.2s;}
.save-btn{background:#26c6da;}
.ask-btn{background:#00bcd4;}
.check-btn{background:#ff9800;}
button.action:hover{opacity:0.85;}
.footer{text-align:center;font-size:11px;padding:8px;background:white;border-top:1px solid #b2ebf2;color:#00acc1;}
@media(max-width:768px){body{align-items:stretch;}.app{height:100vh;border-radius:0;max-width:100%;}header{font-size:16px;padding:14px 16px;}#chat{padding:14px;}.msg{font-size:13px;}button.action{padding:10px;font-size:13px;}}
</style>
</head>

<body>
<div class="app">
<header>
  🤖 AI Memory QC
  <button onclick="clearChat()">Clear</button>
</header>

<div id="chat"></div>

<div class="input-area">
  <select id="user">
    <option value="none">Pilih User</option>
    <option value="QC-Bapro">QC-Bapro</option>
    <option value="QC-Cetak">QC-Cetak</option>
    <option value="QC-Finishing">QC-Finishing</option>
    <option value="QC-Lem">QC-Lem</option>
    <option value="QC-SPV">QC-SPV</option>
    <option value="QC-Manager">QC-Manager</option>
  </select>

  <input type="file" id="file" multiple>
  <textarea id="text" placeholder="Tulis pertanyaan atau simpan data AI..."></textarea>
  <input type="datetime-local" id="reminder" placeholder="Set Reminder">

  <div class="input-row">
    <button class="action save-btn" onclick="save()">💾 Simpan</button>
    <button class="action ask-btn" onclick="ask()">🚀 Tanya</button>
    <button class="action check-btn" onclick="checkReminders()">🔔 Cek Notifikasi</button>
  </div>
</div>

<div class="footer">© 2026 QC Digital System</div>
</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbxnKKh3O4OAkxJCVBloarbbewk-WnYKyllb39kkkb2LR0dBAdkVG7zawYQZE3lKPP7eDg/exec";

const chat=document.getElementById("chat");
const textInput=document.getElementById("text");
const userSelect=document.getElementById("user");
const fileInput=document.getElementById("file");
const reminderInput=document.getElementById("reminder");
let isLoading=false;

function addMsg(text,type,raw=false){
  const div=document.createElement("div");
  div.className="msg "+type;
  if(raw){ div.innerHTML=text; } 
  else{
    const urlRegex=/(https?:\/\/[^\s]+)/g;
    const lines = text.split("\n");
    let result = [];
    for(let i=0;i<lines.length;i++){
      let line = lines[i].trim();
      if(!line) continue;

      if(type==="bot" && line.endsWith(":") && lines[i+1]){
        const label = line.replace(":","").trim();
        let value = lines[i+1].trim().replace(urlRegex,url=>`<a href="${url}" target="_blank">${url}</a>`);
        result.push(`<div class="row"><span class="label">${label} :</span><span class="value">${value}</span></div>`); i++; continue;
      }

      if(type==="bot" && line.includes(":")){
        const index = line.indexOf(":");
        const label = line.substring(0,index).trim();
        let value = line.substring(index+1).trim().replace(urlRegex,url=>`<a href="${url}" target="_blank">${url}</a>`);
        result.push(`<div class="row"><span class="label">${label} :</span><span class="value">${value}</span></div>`); continue;
      }

      result.push(`<div class="value">${line.replace(urlRegex,url=>`<a href="${url}" target="_blank">${url}</a>`)}</div>`);
    }
    div.innerHTML = result.join("");
  }
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function resetInput(){ textInput.value=""; fileInput.value=""; reminderInput.value=""; }
function clearChat(){ chat.innerHTML=""; }
function validate(text){
  if(userSelect.value==="none"){ alert("Pilih user dulu."); return false; }
  if(!text.trim()){ alert("Teks kosong."); return false; }
  return true;
}

async function save(){
  if(isLoading) return;
  const text=textInput.value;
  if(!validate(text)) return;

  isLoading=true;
  addMsg("Menyimpan...","bot",true);

  try{
    const files=fileInput.files;
    let fileArray=[];
    for(let file of files){
      const reader=new FileReader();
      const base64=await new Promise(resolve=>{
        reader.onload=()=>resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(file);
      });
      fileArray.push({ fileName:file.name, mimeType:file.type, fileData:base64 });
    }

    const payload={ 
      action:"add", 
      user:userSelect.value, 
      text:text, 
      files:fileArray, 
      reminder:reminderInput.value 
    };

    const response=await fetch(URL,{ method:"POST", body:new URLSearchParams({ payload:JSON.stringify(payload) }) });
    const result=await response.json();

    if(result.status==="success"){ 
      addMsg("✅ Data & notifikasi berhasil disimpan","bot"); 
      resetInput(); 
    } else {
      addMsg("❌ "+(result.error||"Gagal menyimpan"),"bot"); 
    }

  }catch(err){
    addMsg("❌ Server error","bot");
  }
  isLoading=false;
}

async function ask(){
  if(isLoading) return;
  const text=textInput.value;
  if(!validate(text)) return;

  isLoading=true;
  addMsg(userSelect.value+": "+text,"user");
  textInput.value="";
  addMsg("Mencari jawaban...","bot",true);

  try{
    const payload={ action:"ask", text:text };
    const response=await fetch(URL,{ method:"POST", body:new URLSearchParams({ payload:JSON.stringify(payload) }) });
    const result=await response.json();
    if(result.answer){ addMsg(result.answer,"bot"); }
    else{ addMsg("❌ Tidak ada jawaban","bot"); }

  }catch(err){
    addMsg("❌ Server error","bot");
  }
  isLoading=false;
}

async function checkReminders(){
  if(isLoading) return;
  isLoading=true;
  addMsg("🔔 Memeriksa notifikasi...","bot",true);

  try{
    const payload={ action:"check_reminder" };
    const response=await fetch(URL,{ method:"POST", body:new URLSearchParams({ payload:JSON.stringify(payload) }) });
    const result=await response.json();

    if(result.notifications && result.notifications.length){
      result.notifications.forEach(n=>{
        let text = n.text || "";
        if(n.file){ text += "\nFile: "+n.file; } // gabungkan link
        addMsg(`⏰ Reminder: ${text}\nTanggal: ${n.reminder}`,"bot");
      });
    } else {
      addMsg("✅ Tidak ada notifikasi saat ini","bot");
    }

  }catch(err){
    addMsg("❌ Server error saat cek notifikasi","bot");
  }
  isLoading=false;
}
</script>
</body>
</html>
