<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory QC</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui;}
body{
  background:linear-gradient(135deg,#e6f9fc,#ffffff);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.app{
  width:100%;
  max-width:1000px;
  height:95vh;
  background:white;
  border-radius:22px;
  box-shadow:0 20px 40px rgba(0,150,170,0.15);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
header{
  background:#00bcd4;
  color:white;
  padding:18px 22px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header span{font-size:18px;}
header button{
  background:white;
  border:none;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  color:#00acc1;
  font-weight:600;
}

/* CHAT AREA */
#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  background:#f4feff;
}
.message{
  display:flex;
  gap:10px;
  max-width:85%;
}
.message.user{align-self:flex-end;flex-direction:row-reverse;}
.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#00bcd4;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:bold;
}
.message.user .avatar{background:#26c6da;}
.bubble{
  padding:14px 16px;
  border-radius:18px;
  font-size:14px;
  line-height:1.6;
  background:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  position:relative;
  white-space:pre-wrap;
}
.message.user .bubble{
  background:#00bcd4;
  color:white;
}
.timestamp{
  font-size:10px;
  margin-top:4px;
  opacity:0.6;
}

/* AI CARD */
.card{
  background:white;
  border:1px solid #b2ebf2;
  border-radius:16px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:6px;
  font-size:13px;
}
.card-header{
  font-weight:600;
  color:#00acc1;
}
.card a{
  color:#ff9800;
  font-weight:600;
  text-decoration:none;
}

/* INPUT */
.input-area{
  padding:16px;
  border-top:1px solid #b2ebf2;
  background:white;
  display:flex;
  flex-direction:column;
  gap:10px;
}
select,textarea,input[type="file"],input[type="datetime-local"]{
  padding:10px;
  border-radius:14px;
  border:1px solid #b2ebf2;
  font-size:14px;
}
textarea{
  resize:none;
  min-height:50px;
  max-height:120px;
  overflow-y:auto;
}
.actions{
  display:flex;
  gap:10px;
}
button.action{
  flex:1;
  border:none;
  border-radius:20px;
  padding:10px;
  cursor:pointer;
  font-weight:600;
  color:white;
  transition:0.2s;
}
.save-btn{background:#26c6da;}
.ask-btn{background:#00bcd4;}
.check-btn{background:#ff9800;}
button.action:disabled{opacity:0.6;cursor:not-allowed;}

.typing{
  display:flex;
  gap:4px;
}
.typing span{
  width:6px;height:6px;background:#00bcd4;border-radius:50%;
  animation:blink 1.4s infinite both;
}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{
  0%{opacity:.2;}
  20%{opacity:1;}
  100%{opacity:.2;}
}

@media(max-width:768px){
  .app{height:100vh;border-radius:0;}
}
</style>
</head>

<body>
<div class="app">

<header>
  <span>🤖 AI Memory QC</span>
  <button onclick="AI.clearChat()">Clear</button>
</header>

<div id="chat"></div>

<div class="input-area">
  <select id="user">
    <option value="none">Pilih User</option>
    <option>QC-Bapro</option>
    <option>QC-Cetak</option>
    <option>QC-Finishing</option>
    <option>QC-Lem</option>
    <option>QC-SPV</option>
    <option>QC-Manager</option>
  </select>

  <textarea id="text" placeholder="Tulis pertanyaan atau simpan data..."></textarea>
  <input type="file" id="file" multiple>
  <input type="datetime-local" id="reminder">

  <div class="actions">
    <button class="action save-btn" onclick="AI.save()">💾 Simpan</button>
    <button class="action ask-btn" onclick="AI.ask()">🚀 Tanya</button>
    <button class="action check-btn" onclick="AI.checkReminder()">🔔 Cek</button>
  </div>
</div>

</div>

<script>
const AI = {
  URL:"https://script.google.com/macros/s/AKfycbxnKKh3O4OAkxJCVBloarbbewk-WnYKyllb39kkkb2LR0dBAdkVG7zawYQZE3lKPP7eDg/exec",
  chat:document.getElementById("chat"),
  text:document.getElementById("text"),
  user:document.getElementById("user"),
  file:document.getElementById("file"),
  reminder:document.getElementById("reminder"),
  isLoading:false,

  init(){
    this.loadChat();
    this.text.addEventListener("keydown",(e)=>{
      if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        this.ask();
      }
    });
  },

  /* ========= LINK FORMATTER ========= */
  formatText(text){
    return text
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(
        /(https?:\/\/[^\s]+)/g,
        '<a href="$1" target="_blank" style="color:#ff9800;font-weight:600;">$1</a>'
      );
  },

  addMessage(text,type){
    const msg=document.createElement("div");
    msg.className="message "+type;

    const avatar=document.createElement("div");
    avatar.className="avatar";
    avatar.innerText= type==="user"?"U":"AI";

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.innerHTML=this.formatText(text);

    const time=document.createElement("div");
    time.className="timestamp";
    time.innerText=new Date().toLocaleTimeString();

    bubble.appendChild(time);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    this.chat.appendChild(msg);
    this.chat.scrollTop=this.chat.scrollHeight;
    this.saveChat();
  },

  typingIndicator(){
    const msg=document.createElement("div");
    msg.className="message bot";
    msg.id="typing";

    const avatar=document.createElement("div");
    avatar.className="avatar";
    avatar.innerText="AI";

    const bubble=document.createElement("div");
    bubble.className="bubble";

    const typing=document.createElement("div");
    typing.className="typing";
    typing.innerHTML="<span></span><span></span><span></span>";

    bubble.appendChild(typing);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    this.chat.appendChild(msg);
    this.chat.scrollTop=this.chat.scrollHeight;
  },

  removeTyping(){
    const t=document.getElementById("typing");
    if(t) t.remove();
  },

  async toBase64(file){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.readAsDataURL(file);
      reader.onload=()=>resolve(reader.result);
      reader.onerror=error=>reject(error);
    });
  },

  async ask(){
    if(this.isLoading) return;
    const text=this.text.value.trim();
    if(!text) return;
    if(this.user.value==="none"){alert("Pilih user dulu");return;}

    this.isLoading=true;
    this.addMessage(text,"user");
    this.text.value="";
    this.typingIndicator();

    const payload={action:"ask",text:text};

    try{
      const res=await fetch(this.URL,{
        method:"POST",
        body:new URLSearchParams({payload:JSON.stringify(payload)})
      });
      const data=await res.json();
      this.removeTyping();
      this.addMessage(data.answer||"Tidak ada jawaban","bot");
    }catch(err){
      this.removeTyping();
      this.addMessage("Server error","bot");
    }

    this.isLoading=false;
  },

  async save(){
    if(this.isLoading) return;
    const text=this.text.value.trim();
    if(!text){alert("Teks kosong");return;}
    if(this.user.value==="none"){alert("Pilih user dulu");return;}

    this.isLoading=true;
    this.typingIndicator();

    let fileArray=[];

    for(let f of this.file.files){
      const base64=await this.toBase64(f);
      fileArray.push({
        fileName:f.name,
        mimeType:f.type,
        fileData:base64
      });
    }

    const payload={
      action:"add",
      user:this.user.value,
      text:text,
      reminder:this.reminder.value,
      files:fileArray
    };

    try{
      const res=await fetch(this.URL,{
        method:"POST",
        body:new URLSearchParams({payload:JSON.stringify(payload)})
      });
      await res.json();

      this.removeTyping();
      this.addMessage("Data berhasil disimpan","bot");
      this.text.value="";
      this.reminder.value="";
      this.file.value="";
    }catch(err){
      this.removeTyping();
      this.addMessage("Gagal menyimpan","bot");
    }

    this.isLoading=false;
  },

  async checkReminder(){
    if(this.isLoading) return;
    this.isLoading=true;
    this.typingIndicator();

    try{
      const res=await fetch(this.URL,{
        method:"POST",
        body:new URLSearchParams({payload:JSON.stringify({action:"check_reminder"})})
      });
      const data=await res.json();

      this.removeTyping();

      if(data.notifications && data.notifications.length){
        data.notifications.forEach(n=>{
          let message="🔔 "+n.text+"\n"+n.reminder;
          if(n.file){
            message+="\n"+n.file;
          }
          this.addMessage(message,"bot");
        });
      }else{
        this.addMessage("Tidak ada notifikasi","bot");
      }
    }catch(err){
      this.removeTyping();
      this.addMessage("Error cek notifikasi","bot");
    }

    this.isLoading=false;
  },

  saveChat(){
    localStorage.setItem("ai_chat",this.chat.innerHTML);
  },

  loadChat(){
    const saved=localStorage.getItem("ai_chat");
    if(saved) this.chat.innerHTML=saved;
  },

  clearChat(){
    localStorage.removeItem("ai_chat");
    this.chat.innerHTML="";
  }
};

AI.init();
</script>

</body>
</html>
