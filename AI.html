<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}

body{
  background:linear-gradient(135deg,#dff6ff,#f7fbff,#eef2ff);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:100%;
  max-width:1000px;
  height:95vh;
  background:#ffffff;
  border-radius:26px;
  box-shadow:
    0 30px 60px rgba(0,0,0,0.08),
    0 10px 20px rgba(0,0,0,0.04);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ================= HEADER ================= */

header{
  background:linear-gradient(135deg,#00bcd4,#0097a7);
  color:white;
  padding:20px 24px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
  letter-spacing:.5px;
}

header span{
  font-size:18px;
}

header button{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.3);
  padding:8px 16px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  color:white;
  font-weight:600;
  transition:0.2s;
}

header button:hover{
  background:white;
  color:#0097a7;
}

/* ================= CHAT AREA ================= */

#chat{
  flex:1;
  overflow-y:auto;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
  background:linear-gradient(to bottom,#f9feff,#f3fbff);
}

.message{
  display:flex;
  gap:12px;
  max-width:85%;
  animation:fadeIn .25s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;transform:translateY(0);}
}

.message.user{
  align-self:flex-end;
  flex-direction:row-reverse;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,#00bcd4,#0097a7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.message.user .avatar{
  background:linear-gradient(135deg,#7c4dff,#512da8);
}

.bubble{
  padding:16px 18px;
  border-radius:20px;
  font-size:14px;
  line-height:1.7;
  background:white;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  position:relative;
  white-space:pre-wrap;
}

.message.user .bubble{
  background:linear-gradient(135deg,#00bcd4,#0097a7);
  color:white;
}

.timestamp{
  font-size:10px;
  margin-top:6px;
  opacity:0.5;
}

/* ================= AI CARD ================= */

.card{
  background:#ffffff;
  border:1px solid #d6f4ff;
  border-radius:18px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  font-size:13px;
  box-shadow:0 6px 16px rgba(0,0,0,0.04);
}

.card-header{
  font-weight:600;
  color:#0097a7;
}

.card a{
  color:#7c4dff;
  font-weight:600;
  text-decoration:none;
}

.card a:hover{
  text-decoration:underline;
}

/* ================= INPUT ================= */

.input-area{
  padding:20px;
  border-top:1px solid #e6f3ff;
  background:#ffffff;
  display:flex;
  flex-direction:column;
  gap:12px;
}

select,
textarea,
input[type="file"],
input[type="datetime-local"]{
  padding:12px;
  border-radius:16px;
  border:1px solid #e0f2f7;
  font-size:14px;
  background:#f9feff;
  transition:0.2s;
}

select:focus,
textarea:focus,
input:focus{
  outline:none;
  border-color:#00bcd4;
  box-shadow:0 0 0 3px rgba(0,188,212,0.1);
}

textarea{
  resize:none;
  min-height:60px;
  max-height:140px;
  overflow-y:auto;
}

/* ================= DATE FIX ================= */

.date-wrapper{
  display:flex;
  flex-direction:column;
  gap:6px;
  width:100%;
}

.date-wrapper label{
  font-size:12px;
  font-weight:600;
  color:#0097a7;
  padding-left:4px;
}

.date-wrapper input{
  width:100%;
  min-height:48px;
}

input[type="datetime-local"]{
  width:100%;
}

input[type="datetime-local"]::-webkit-calendar-picker-indicator{
  opacity:0.7;
  cursor:pointer;
}

/* ================= BUTTONS ================= */

.actions{
  display:flex;
  gap:12px;
}

button.action{
  flex:1;
  border:none;
  border-radius:22px;
  padding:12px;
  cursor:pointer;
  font-weight:600;
  color:white;
  transition:0.2s;
  box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.save-btn{
  background:linear-gradient(135deg,#26c6da,#00acc1);
}

.ask-btn{
  background:linear-gradient(135deg,#7c4dff,#512da8);
}

.check-btn{
  background:linear-gradient(135deg,#ff9800,#f57c00);
}

button.action:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 24px rgba(0,0,0,0.12);
}

button.action:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

/* ================= TYPING ================= */

.typing{
  display:flex;
  gap:4px;
}

.typing span{
  width:6px;
  height:6px;
  background:#00bcd4;
  border-radius:50%;
  animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
  0%{opacity:.2;}
  20%{opacity:1;}
  100%{opacity:.2;}
}

/* ================= MOBILE ================= */

@media(max-width:768px){
  .app{
    height:100vh;
    border-radius:0;
  }
}
</style>
</head>

<body>
<div class="app">

<header>
  <span>🤖 AI Memory</span>
  <button onclick="AI.clearChat()">Clear</button>
</header>

<div id="chat"></div>

<div class="input-area">
  <select id="user">
    <option value="none">Pilih User</option>
    <option>QC-Bapro</option>
    <option>QC-Cetak</option>
    <option>QC-Finishing</option>
    <option>QC-Lem</option>
    <option>QC-SPV</option>
    <option>QC-Manager</option>
  </select>

  <textarea id="text" placeholder="Tulis pertanyaan atau simpan data..."></textarea>

  <input type="file" id="file" multiple>

  <div class="date-wrapper">
    <label for="reminder">⏰ Set Reminder</label>
    <input type="datetime-local" id="reminder">
  </div>

  <div class="actions">
    <button class="action save-btn" onclick="AI.save()">💾 Simpan</button>
    <button class="action ask-btn" onclick="AI.ask()">🚀 Tanya</button>
    <button class="action check-btn" onclick="AI.checkReminder()">🔔 Cek</button>
  </div>
</div>

</div>



<script>
const AI = {
  URL:"https://script.google.com/macros/s/AKfycbxnKKh3O4OAkxJCVBloarbbewk-WnYKyllb39kkkb2LR0dBAdkVG7zawYQZE3lKPP7eDg/exec",
  chat:document.getElementById("chat"),
  text:document.getElementById("text"),
  user:document.getElementById("user"),
  file:document.getElementById("file"),
  reminder:document.getElementById("reminder"),
  isLoading:false,

  init(){
    this.loadChat();

    // ENTER hanya untuk baris baru
    this.text.addEventListener("keydown",(e)=>{
      if(e.key==="Enter"){
        return;
      }
    });
  },

  /* ========= LINK FORMATTER ========= */
  formatText(text){
    return text
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(
        /(https?:\/\/[^\s]+)/g,
        '<a href="$1" target="_blank" style="color:#ff9800;font-weight:600;">$1</a>'
      );
  },

  addMessage(text,type){
    const msg=document.createElement("div");
    msg.className="message "+type;

    const avatar=document.createElement("div");
    avatar.className="avatar";
    avatar.innerText= type==="user"?"U":"AI";

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.innerHTML=this.formatText(text);

    const time=document.createElement("div");
    time.className="timestamp";
    time.innerText=new Date().toLocaleTimeString();

    bubble.appendChild(time);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    this.chat.appendChild(msg);
    this.chat.scrollTop=this.chat.scrollHeight;
    this.saveChat();
  },

  typingIndicator(){
    const msg=document.createElement("div");
    msg.className="message bot";
    msg.id="typing";

    const avatar=document.createElement("div");
    avatar.className="avatar";
    avatar.innerText="AI";

    const bubble=document.createElement("div");
    bubble.className="bubble";

    const typing=document.createElement("div");
    typing.className="typing";
    typing.innerHTML="<span></span><span></span><span></span>";

    bubble.appendChild(typing);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    this.chat.appendChild(msg);
    this.chat.scrollTop=this.chat.scrollHeight;
  },

  removeTyping(){
    const t=document.getElementById("typing");
    if(t) t.remove();
  },

  async toBase64(file){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.readAsDataURL(file);
      reader.onload=()=>resolve(reader.result);
      reader.onerror=error=>reject(error);
    });
  },

  async ask(){
    if(this.isLoading) return;

    const text=this.text.value.trim();

    // ✅ Tambahan validasi teks kosong
    if(!text){
      alert("Teks kosong");
      return;
    }

    if(this.user.value==="none"){
      alert("Pilih user dulu");
      return;
    }

    this.isLoading=true;
    this.addMessage(text,"user");
    this.text.value="";
    this.typingIndicator();

    const payload={action:"ask",text:text};

    try{
      const res=await fetch(this.URL,{
        method:"POST",
        body:new URLSearchParams({payload:JSON.stringify(payload)})
      });
      const data=await res.json();
      this.removeTyping();
      this.addMessage(data.answer||"Tidak ada jawaban","bot");
    }catch(err){
      this.removeTyping();
      this.addMessage("Server error","bot");
    }

    this.isLoading=false;
  },

  async save(){
    if(this.isLoading) return;

    const text=this.text.value.trim();
    if(!text){
      alert("Teks kosong");
      return;
    }

    if(this.user.value==="none"){
      alert("Pilih user dulu");
      return;
    }

    this.isLoading=true;
    this.typingIndicator();

    let fileArray=[];

    for(let f of this.file.files){
      const base64=await this.toBase64(f);
      fileArray.push({
        fileName:f.name,
        mimeType:f.type,
        fileData:base64
      });
    }

    const payload={
      action:"add",
      user:this.user.value,
      text:text,
      reminder:this.reminder.value,
      files:fileArray
    };

    try{
      const res=await fetch(this.URL,{
        method:"POST",
        body:new URLSearchParams({payload:JSON.stringify(payload)})
      });
      await res.json();

      this.removeTyping();
      this.addMessage("Data berhasil disimpan","bot");
      this.text.value="";
      this.reminder.value="";
      this.file.value="";
    }catch(err){
      this.removeTyping();
      this.addMessage("Gagal menyimpan","bot");
    }

    this.isLoading=false;
  },

  async checkReminder(){
    if(this.isLoading) return;

    this.isLoading=true;
    this.typingIndicator();

    try{
      const res=await fetch(this.URL,{
        method:"POST",
        body:new URLSearchParams({payload:JSON.stringify({action:"check_reminder"})})
      });
      const data=await res.json();

      this.removeTyping();

      if(data.notifications && data.notifications.length){
        data.notifications.forEach(n=>{
          let message="🔔 "+n.text+"\n"+n.reminder;
          if(n.file){
            message+="\n"+n.file;
          }
          this.addMessage(message,"bot");
        });
      }else{
        this.addMessage("Tidak ada notifikasi","bot");
      }
    }catch(err){
      this.removeTyping();
      this.addMessage("Error cek notifikasi","bot");
    }

    this.isLoading=false;
  },

  saveChat(){
    localStorage.setItem("ai_chat",this.chat.innerHTML);
  },

  loadChat(){
    const saved=localStorage.getItem("ai_chat");
    if(saved) this.chat.innerHTML=saved;
  },

  clearChat(){
    if(confirm("Yakin ingin menghapus semua chat?")){
      localStorage.removeItem("ai_chat");
      this.chat.innerHTML="";
    }
  }
};

AI.init();
</script>

</body>
</html>
