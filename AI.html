<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}

/* BODY */

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:14px;
}

/* APP */

.app{
width:100%;
max-width:1000px;

height:95vh;
max-height:900px;

background:#ffffff;

border-radius:24px;

box-shadow:
0 30px 70px rgba(0,0,0,0.25),
0 10px 25px rgba(0,0,0,0.15);

display:flex;
flex-direction:column;

overflow:hidden;
}

/* HEADER */

header{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;

padding:18px 22px;

font-weight:600;

display:flex;
justify-content:space-between;
align-items:center;
}

header span{
font-size:18px;
letter-spacing:0.4px;
}

header button{
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.25);

padding:8px 16px;

border-radius:20px;

font-size:12px;

cursor:pointer;

color:white;

transition:0.2s;
}

header button:hover{
background:rgba(255,255,255,0.3);
}

/* CHAT */

#chat{
flex:1;

overflow-y:auto;

padding:22px;

display:flex;
flex-direction:column;

gap:18px;

background:#f7f9fc;
}

/* MESSAGE */

.message{
display:flex;
gap:10px;
max-width:92%;
}

.message.user{
align-self:flex-end;
flex-direction:row-reverse;
}

/* AVATAR */

.avatar{
width:38px;
height:38px;

border-radius:50%;

background:linear-gradient(135deg,#667eea,#764ba2);

color:white;

display:flex;
align-items:center;
justify-content:center;

font-size:13px;
font-weight:bold;

flex-shrink:0;
}

.message.user .avatar{
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* BUBBLE */

.bubble{
padding:14px 16px;

border-radius:18px;

font-size:14px;

line-height:1.6;

background:white;

white-space:pre-wrap;

max-width:100%;
word-wrap:break-word;
overflow-wrap:break-word;

box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.message.user .bubble{
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
}

/* TIME */

.timestamp{
font-size:10px;
margin-top:6px;
opacity:0.55;
}

/* INPUT AREA */

.input-area{
padding:18px;

border-top:1px solid #e6edf5;

display:flex;
flex-direction:column;

gap:12px;

background:#ffffff;
}

/* INPUT */

select,
textarea,
input[type="file"],
input[type="datetime-local"]{

padding:12px;

border-radius:14px;

border:1px solid #dbe4f0;

font-size:13px;

width:100%;

background:#f9fbff;
}

textarea{
min-height:70px;
resize:none;
}

/* DATE MEMO PLACEHOLDER */

input[type="datetime-local"]:invalid{
color:#777;
}

input[type="datetime-local"]:invalid:before{
content:"Memo";
color:#777;
}

/* ACTION */

.actions{
display:flex;

gap:10px;

flex-wrap:wrap;
}

button.action{
flex:1;

min-width:120px;

border:none;

border-radius:22px;

padding:12px;

cursor:pointer;

font-weight:600;

color:white;

font-size:13px;

transition:0.2s;
}

button.action:hover{
transform:translateY(-2px);
opacity:0.9;
}

.save-btn{background:linear-gradient(135deg,#00c9ff,#92fe9d);}
.ask-btn{background:linear-gradient(135deg,#667eea,#764ba2);}
.check-btn{background:linear-gradient(135deg,#ff9966,#ff5e62);}

/* TYPING */

.typing{
display:flex;
gap:4px;
}

.typing span{
width:6px;
height:6px;

background:#667eea;

border-radius:50%;

animation:blink 1.4s infinite both;
}

@keyframes blink{
0%{opacity:.2;}
20%{opacity:1;}
100%{opacity:.2;}
}

/* POPUP */

.ai-popup{
position:fixed;

inset:0;

background:rgba(0,0,0,0.55);

display:none;

align-items:center;
justify-content:center;

z-index:9999;

padding:16px;
}

.ai-popup-box{

background:#ffffff;

width:100%;
max-width:650px;

max-height:80vh;

overflow:auto;

border-radius:18px;

padding:24px;

box-shadow:0 25px 70px rgba(0,0,0,0.35);

display:flex;
flex-direction:column;

gap:14px;

font-size:14px;

line-height:1.6;

white-space:pre-wrap;
}

.ai-popup-close{
display:flex;
justify-content:flex-end;
}

.ai-popup-close button{

border:none;

background:linear-gradient(135deg,#ff416c,#ff4b2b);

color:white;

padding:6px 14px;

border-radius:10px;

font-size:12px;

font-weight:600;

cursor:pointer;
}

#aiPopupContent{
word-break:break-word;
}

#aiPopupContent a{
color:#2962ff;
font-weight:600;
text-decoration:none;
}

/* ================= MOBILE ================= */

@media (max-width:768px){

body{
padding:0;
align-items:stretch;
}

.app{
height:100vh;
border-radius:0;
max-width:100%;
}

header{
padding:16px;
}

header span{
font-size:16px;
}

#chat{
padding:16px;
gap:14px;
}

.message{
max-width:95%;
}

.bubble{
font-size:13px;
}

.avatar{
width:32px;
height:32px;
min-width:32px;
min-height:32px;
font-size:12px;
}

.input-area{
padding:14px;
}

textarea{
min-height:60px;
}

.actions{
flex-direction:column;
}

button.action{
width:100%;
}

.ai-popup-box{
max-height:85vh;
}

}

</style>


</head>

<body>

<div class="app">

<header>
<span>🤖 AI Memory</span>
<button onclick="AI.clearChat()">Clear</button>
</header>

<div id="chat"></div>

<div class="input-area">

<select id="user">
<option value="none">Pilih User</option>
<option>QC-Bapro</option>
<option>QC-Cetak</option>
<option>QC-Finishing</option>
<option>QC-Lem</option>
<option>QC-SPV</option>
<option>QC-Manager</option>
</select>

<textarea id="text" placeholder="Tulis pertanyaan atau simpan data..."></textarea>

<input type="file" id="file" multiple>

<input type="datetime-local" id="reminder">

<div class="actions">
<button class="action save-btn" onclick="AI.save()">💾 Simpan</button>
<button class="action ask-btn" onclick="AI.ask()">🚀 Tanya</button>
<button class="action check-btn" onclick="AI.checkReminder()">🔔 Cek</button>
</div>

</div>
</div>

<!-- POPUP -->
<div class="ai-popup" id="aiPopup">
<div class="ai-popup-box">

<div class="ai-popup-close">
<button onclick="AI.closePopup()">Tutup</button>
</div>

<div id="aiPopupContent"></div>

</div>
</div>

<script>

const AI = {

URL:"https://script.google.com/macros/s/AKfycbwkTNFe_xT6b4lqMUKJD04Q44IV7oeIKXFBbTz7r8Xp9sIM8hmW18kty9ZDUotNOK9JZw/exec",
chat:document.getElementById("chat"),
text:document.getElementById("text"),
user:document.getElementById("user"),
file:document.getElementById("file"),
reminder:document.getElementById("reminder"),
isLoading:false,

init(){
this.loadChat();
},

formatText(text){
return text
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
},

addMessage(text,type){

const msg=document.createElement("div");
msg.className="message "+type;

const avatar=document.createElement("div");
avatar.className="avatar";
avatar.innerText= type==="user"?"U":"AI";

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.innerHTML=this.formatText(text);

if(type==="bot"){
bubble.style.cursor="pointer";
bubble.onclick=()=>this.openPopup(text);
}

const time=document.createElement("div");
time.className="timestamp";
time.innerText=new Date().toLocaleTimeString();

bubble.appendChild(time);
msg.appendChild(avatar);
msg.appendChild(bubble);

this.chat.appendChild(msg);
this.chat.scrollTop=this.chat.scrollHeight;
this.saveChat();
},

openPopup(text){
document.getElementById("aiPopupContent").innerHTML=this.formatText(text);
document.getElementById("aiPopup").style.display="flex";
},

closePopup(){
document.getElementById("aiPopup").style.display="none";
},

typingIndicator(){
const msg=document.createElement("div");
msg.className="message bot";
msg.id="typing";

const avatar=document.createElement("div");
avatar.className="avatar";
avatar.innerText="AI";

const bubble=document.createElement("div");
bubble.className="bubble";

const typing=document.createElement("div");
typing.className="typing";
typing.innerHTML="<span></span><span></span><span></span>";

bubble.appendChild(typing);
msg.appendChild(avatar);
msg.appendChild(bubble);

this.chat.appendChild(msg);
this.chat.scrollTop=this.chat.scrollHeight;
},

removeTyping(){
const t=document.getElementById("typing");
if(t) t.remove();
},

async toBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>resolve(reader.result);
reader.onerror=error=>reject(error);
});
},

async ask(){

if(this.isLoading) return;

const text=this.text.value.trim();

if(!text){
alert("Teks kosong");
return;
}

if(this.user.value==="none"){
alert("Pilih user dulu");
return;
}

this.isLoading=true;
this.addMessage(text,"user");
this.text.value="";
this.typingIndicator();

const payload={action:"ask",text:text};

try{
const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify(payload)})
});
const data=await res.json();
this.removeTyping();
this.addMessage(data.answer||"Tidak ada jawaban","bot");
}catch(err){
this.removeTyping();
this.addMessage("Server error","bot");
}

this.isLoading=false;
},

async save(){

if(this.isLoading) return;

const text=this.text.value.trim();

if(!text){
alert("Teks kosong");
return;
}

if(this.user.value==="none"){
alert("Pilih user dulu");
return;
}

this.isLoading=true;
this.typingIndicator();

let fileArray=[];

for(let f of this.file.files){
const base64=await this.toBase64(f);
fileArray.push({
fileName:f.name,
mimeType:f.type,
fileData:base64
});
}

const payload={
action:"add",
user:this.user.value,
text:text,
reminder:this.reminder.value,
files:fileArray
};

try{
const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify(payload)})
});
await res.json();

this.removeTyping();
this.addMessage("Data berhasil disimpan","bot");
this.text.value="";
this.reminder.value="";
this.file.value="";
}catch(err){
this.removeTyping();
this.addMessage("Gagal menyimpan","bot");
}

this.isLoading=false;
},

async checkReminder(){

if(this.isLoading) return;

this.isLoading=true;
this.typingIndicator();

try{

const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify({action:"check_reminder"})})
});

const data=await res.json();

this.removeTyping();

if(data.notifications && data.notifications.length){

data.notifications.forEach(n=>{
let message="🔔 "+n.text+"\n"+n.reminder;
if(n.file){
message+="\n"+n.file;
}
this.addMessage(message,"bot");
});

}else{

this.addMessage("Tidak ada notifikasi","bot");

}

}catch(err){

this.removeTyping();
this.addMessage("Error cek notifikasi","bot");

}

this.isLoading=false;

},

saveChat(){
localStorage.setItem("ai_chat",this.chat.innerHTML);
},

loadChat(){
const saved=localStorage.getItem("ai_chat");
if(saved){
this.chat.innerHTML=saved;
this.rebindPopup();
}
},

rebindPopup(){

const bubbles=this.chat.querySelectorAll(".message.bot .bubble");

bubbles.forEach(bubble=>{

bubble.style.cursor="pointer";

bubble.onclick=()=>{
this.openPopup(bubble.innerText);
};

});

},

clearChat(){
if(confirm("Yakin ingin menghapus semua chat?")){
localStorage.removeItem("ai_chat");
this.chat.innerHTML="";
}
}

};

AI.init();

</script>

</body>
</html>
