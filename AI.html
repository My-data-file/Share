<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}

/* BODY */

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:14px;
}

/* APP */

.app{
width:100%;
max-width:1300px;

height:95vh;
max-height:900px;

background:#ffffff;

border-radius:24px;

box-shadow:
0 30px 70px rgba(0,0,0,0.25),
0 10px 25px rgba(0,0,0,0.15);

display:flex;
flex-direction:column;

overflow:hidden;

transition:all .25s ease;
}

/* FULLSCREEN MODE */

.app.full{
max-width:100%;
height:100vh;
max-height:none;
border-radius:0;
}

/* HIDE INPUT SAAT FULL */

.app.full .input-area select,
.app.full .input-area textarea,
.app.full .input-area input[type="file"],
.app.full .input-area input[type="datetime-local"],
.app.full .input-area .memo-label{
display:none;
}

.app.full .actions{
justify-content:center;
}

/* sembunyikan tombol simpan dan tanya */
.app.full .save-btn,
.app.full .ask-btn{
display:none;
}

/* tampilkan hanya tombol cek */
.app.full .check-btn{
flex:0 0 auto;
min-width:160px;
}

/* HEADER */

header{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;

position:relative;

padding:18px 22px;

font-weight:600;

display:flex;
justify-content:space-between;
align-items:center;
}

header span{
font-size:18px;
letter-spacing:0.4px;
}

header button{
background:#ffffff;
border:1px solid #e0e6ef;

padding:8px 16px;

border-radius:20px;

font-size:12px;

cursor:pointer;

color:#222;

transition:0.2s;

box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

header button:hover{
background:#f4f6fb;
transform:translateY(-1px);
}

/* FILTER CHAT */

.filter-box{
display:none;

position:absolute;
top:60px;
right:12px;

background:#ffffff;
border-radius:14px;

padding:10px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);

flex-direction:column;
gap:8px;

z-index:999;
}

.filter-box input{
padding:6px 10px;
border-radius:12px;
border:1px solid #dbe4f0;
font-size:12px;
}

.highlight{
background:#fff176;
color:#000;
padding:2px 4px;
border-radius:4px;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:22px;
display:flex;
flex-direction:column;
gap:18px;
background:#f7f9fc;
}

/* MESSAGE */

.message{
display:flex;
gap:10px;
max-width:92%;
}

.message.user{
align-self:flex-end;
flex-direction:row-reverse;
}

/* AVATAR */

.avatar{
width:38px;
height:38px;
border-radius:50%;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:bold;
flex-shrink:0;
}

.message.user .avatar{
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

/* BUBBLE */

.bubble{
padding:14px 16px;
border-radius:18px;
font-size:14px;
line-height:1.6;
background:white;
white-space:pre-wrap;
max-width:100%;
word-wrap:break-word;
overflow-wrap:break-word;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.message.user .bubble{
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
}

/* REMINDER HIGHLIGHT */

.message.reminder .bubble{
background:#fff3cd;
border:1px solid #ffeeba;
color:#856404;
}

/* TIME */

.timestamp{
font-size:10px;
margin-top:6px;
opacity:0.55;
}

/* INPUT AREA */

.input-area{
padding:18px;
border-top:1px solid #e6edf5;
display:flex;
flex-direction:column;
gap:12px;
background:#ffffff;
}

/* INPUT */

select,
textarea,
input[type="file"],
input[type="datetime-local"]{
padding:12px;
border-radius:14px;
border:1px solid #dbe4f0;
font-size:13px;
width:100%;
background:#f9fbff;
}

textarea{
min-height:70px;
resize:none;
}

/* LABEL MEMO */

.memo-label{
font-size:12px;
color:#666;
margin-top:4px;
margin-bottom:-6px;
padding-left:4px;
}

/* ACTION */

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button.action{
flex:1;
min-width:120px;
border:none;
border-radius:22px;
padding:12px;
cursor:pointer;
font-weight:600;
color:white;
font-size:13px;
transition:0.2s;
}

button.action:hover{
transform:translateY(-2px);
opacity:0.9;
}

.save-btn{background:linear-gradient(135deg,#00c9ff,#92fe9d);} 
.ask-btn{background:linear-gradient(135deg,#667eea,#764ba2);} 
.check-btn{background:linear-gradient(135deg,#ff9966,#ff5e62);} 

/* MOBILE */

@media (max-width:768px){

body{
padding:0;
align-items:stretch;
}

.app{
height:100vh;
border-radius:0;
max-width:100%;
}

header{
padding:16px;
}

header span{
font-size:16px;
}

#chat{
padding:16px;
gap:14px;
}

.message{
max-width:95%;
}

.bubble{
font-size:13px;
}

.avatar{
width:32px;
height:32px;
min-width:32px;
min-height:32px;
font-size:12px;
}

.input-area{
padding:14px;
}

textarea{
min-height:60px;
}

.actions{
flex-direction:column;
}

button.action{
width:100%;
}

}

/* TYPING INDICATOR */

.typing{
display:flex;
align-items:center;
gap:4px;
height:14px;
}

.typing span{
width:6px;
height:6px;
border-radius:50%;
background:#999;
animation:typingBounce 1.4s infinite ease-in-out;
}

.typing span:nth-child(2){
animation-delay:0.2s;
}

.typing span:nth-child(3){
animation-delay:0.4s;
}

@keyframes typingBounce{
0%,80%,100%{
transform:scale(0);
opacity:0.4;
}
40%{
transform:scale(1);
opacity:1;
}
}

#filterNav{
display:flex;
align-items:center;
gap:6px;
margin-left:6px;
}

#filterNav button{
border:none;
background:#eee;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

#filterNav span{
font-size:12px;
color:#333;
min-width:40px;
text-align:center;
}

/* highlight semua hasil */

.highlight{
background:#fff176;
color:#000;
padding:2px 4px;
border-radius:4px;
}

/* highlight hasil yang sedang dipilih */

.highlight.active{
background:#ff9800;
color:#fff;
box-shadow:0 0 0 2px rgba(255,152,0,0.4);
}

</style>

</head>

<body>

<div class="app">

<header>
<span>🤖 AI Memory</span>

<div style="display:flex;gap:8px;align-items:center;">

<div class="filter-box" id="filterBox">

<input id="filterText" placeholder="Filter chat..." oninput="filterChat()">

<div id="filterNav">

<button onclick="prevMatch()">◀</button>
<span id="filterCount">0/0</span>
<button onclick="nextMatch()">▶</button>

</div>

</div>

<button onclick="toggleFilter()">Filter</button>
<button onclick="AI.toggleFull()">Full</button>
<button onclick="AI.clearChat()">Clear</button>

</div>

</header>

<div id="chat"></div>

<div class="input-area">

<select id="user">
<option value="none">Pilih User</option>
<option>QC-Bapro</option>
<option>QC-Cetak</option>
<option>QC-Finishing</option>
<option>QC-Lem</option>
<option>QC-SPV</option>
<option>QC-Manager</option>
</select>

<textarea id="text" placeholder="Tulis pertanyaan atau simpan data..."></textarea>

<input type="file" id="file" multiple>

<label class="memo-label">📝 Memo</label>
<input type="datetime-local" id="reminder">

<div class="actions">
<button class="action save-btn" onclick="AI.save()">💾 Simpan</button>
<button class="action ask-btn" onclick="AI.ask()">🚀 Tanya</button>
<button class="action check-btn" onclick="AI.checkReminder()">🔔 Cek</button>
</div>

</div>
</div>

<!-- POPUP DETAIL CHAT -->
<div id="aiPopup" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:999;padding:20px;">

<div style="background:white;max-width:700px;width:100%;max-height:80vh;overflow:auto;border-radius:18px;padding:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2);">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:600;">
<span>Detail Jawaban</span>
<button onclick="AI.closePopup()" style="border:none;background:#ff5e62;color:white;padding:6px 12px;border-radius:12px;cursor:pointer;">Tutup</button>
</div>

<div id="aiPopupContent" style="
font-size:14px;
line-height:1.6;
white-space:pre-wrap;
word-wrap:break-word;
overflow-wrap:break-word;
word-break:break-word;
"></div>

</div>
</div>

<script>

/* ================= FILTER CHAT ADVANCED ================= */

let matches=[];
let currentMatch=0;

function toggleFilter(){

const box=document.getElementById("filterBox");

if(box.style.display==="flex"){
box.style.display="none";
clearHighlight();
}else{
box.style.display="flex";
document.getElementById("filterText").focus();
}

}

function filterChat(){

const keyword=document.getElementById("filterText").value.trim();

clearHighlight();

matches=[];
currentMatch=0;

if(!keyword){
updateCounter();
return;
}

const bubbles=document.querySelectorAll("#chat .bubble");

bubbles.forEach(bubble=>{
highlightText(bubble,keyword);
});

matches=[...document.querySelectorAll(".highlight")];

updateCounter();

if(matches.length){
scrollToMatch(0);
}

}

function highlightText(element,keyword){

const walk=document.createTreeWalker(
element,
NodeFilter.SHOW_TEXT,
null,
false
);

let node;
const regex=new RegExp(keyword,"gi");

while(node=walk.nextNode()){

if(node.nodeValue.trim()!==""){

const span=document.createElement("span");

span.innerHTML=node.nodeValue.replace(regex,
m=>`<span class="highlight">${m}</span>`
);

node.replaceWith(...span.childNodes);

}

}

}

function nextMatch(){

if(!matches.length) return;

currentMatch++;

if(currentMatch>=matches.length) currentMatch=0;

scrollToMatch(currentMatch);

}

function prevMatch(){

if(!matches.length) return;

currentMatch--;

if(currentMatch<0) currentMatch=matches.length-1;

scrollToMatch(currentMatch);

}

function scrollToMatch(index){

document.querySelectorAll(".highlight").forEach(el=>{
el.classList.remove("active");
});

matches[index].classList.add("active");

matches[index].scrollIntoView({
behavior:"smooth",
block:"center"
});

updateCounter();

}

function updateCounter(){

const counter=document.getElementById("filterCount");

if(!matches.length){
counter.textContent="0/0";
}else{
counter.textContent=(currentMatch+1)+"/"+matches.length;
}

}

function clearHighlight(){

document.querySelectorAll(".highlight").forEach(el=>{
const parent=el.parentNode;
parent.replaceChild(document.createTextNode(el.textContent),el);
parent.normalize();
});

matches=[];
updateCounter();

}

const AI = {

URL:"https://script.google.com/macros/s/AKfycbxiB3aTGxS1tWgK0YxmCGX0VcAPR1vR-AjExfw6WjPbOWGy8fhoE4wAdUkZhPBOrZPm5w/exec",
chat:document.getElementById("chat"),
text:document.getElementById("text"),
user:document.getElementById("user"),
file:document.getElementById("file"),
reminder:document.getElementById("reminder"),
isLoading:false,

init(){
this.loadChat();

/* AUTO CEK REMINDER SEKALI SAAT HALAMAN DIBUKA */
setTimeout(()=>{
this.checkReminder();
},800);

},

toggleFull(){

const app=document.querySelector(".app");
const btn=event.target;

app.classList.toggle("full");

if(app.classList.contains("full")){
btn.innerText="Hide";
}else{
btn.innerText="Full";
}

},

formatText(text){

text = text
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

text = text.replace(/https?:\/\/[^\s]+/g,function(url){
return '<a href="'+url+'" target="_blank" style="display:inline-block;background:#667eea;color:white;padding:6px 10px;border-radius:8px;font-size:12px;text-decoration:none;">🔗 Buka File</a>';
});

return text;

},

addMessage(text,type){

const msg=document.createElement("div");
msg.className="message "+type;

const avatar=document.createElement("div");
avatar.className="avatar";
avatar.innerText= type==="user"?"U":"AI";

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.innerHTML=this.formatText(text);

if(type!=="user"){
bubble.style.cursor="pointer";
bubble.onclick=()=>this.openPopup(text);
}

const time=document.createElement("div");
time.className="timestamp";
time.innerText=new Date().toLocaleTimeString();

bubble.appendChild(time);
msg.appendChild(avatar);
msg.appendChild(bubble);

this.chat.appendChild(msg);
this.chat.scrollTop=this.chat.scrollHeight;

this.saveChat();
},

openPopup(text){
document.getElementById("aiPopupContent").innerHTML=this.formatText(text);
document.getElementById("aiPopup").style.display="flex";
},

closePopup(){
document.getElementById("aiPopup").style.display="none";
},

typingIndicator(){
const msg=document.createElement("div");
msg.className="message bot";
msg.id="typing";

const avatar=document.createElement("div");
avatar.className="avatar";
avatar.innerText="AI";

const bubble=document.createElement("div");
bubble.className="bubble";

const typing=document.createElement("div");
typing.className="typing";
typing.innerHTML="<span></span><span></span><span></span>";

bubble.appendChild(typing);
msg.appendChild(avatar);
msg.appendChild(bubble);

this.chat.appendChild(msg);
this.chat.scrollTop=this.chat.scrollHeight;
},

removeTyping(){
const t=document.getElementById("typing");
if(t) t.remove();
},

async toBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>resolve(reader.result);
reader.onerror=error=>reject(error);
});
},

async ask(){

if(this.isLoading) return;

const text=this.text.value.trim();

if(!text){
alert("Teks kosong");
return;
}

if(this.user.value==="none"){
alert("Pilih user dulu");
return;
}

this.isLoading=true;
this.addMessage(text,"user");
this.text.value="";
this.typingIndicator();

const payload={action:"ask",text:text};

try{
const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify(payload)})
});
const data=await res.json();
this.removeTyping();
this.addMessage(data.answer||"Tidak ada jawaban","bot");
}catch(err){
this.removeTyping();
this.addMessage("Server error","bot");
}

this.isLoading=false;
},

async save(){

if(this.isLoading) return;

const text=this.text.value.trim();

if(!text){
alert("Teks kosong");
return;
}

if(this.user.value==="none"){
alert("Pilih user dulu");
return;
}

this.isLoading=true;
this.typingIndicator();

let fileArray=[];

for(let f of this.file.files){
const base64=await this.toBase64(f);
fileArray.push({
fileName:f.name,
mimeType:f.type,
fileData:base64
});
}

const payload={
action:"add",
user:this.user.value,
text:text,
reminder:this.reminder.value,
files:fileArray
};

try{
const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify(payload)})
});
await res.json();

this.removeTyping();
this.addMessage("Data berhasil disimpan","bot");
this.text.value="";
this.reminder.value="";
this.file.value="";
}catch(err){
this.removeTyping();
this.addMessage("Gagal menyimpan","bot");
}

this.isLoading=false;
},

async checkReminder(){

if(this.isLoading) return;

this.isLoading=true;
this.typingIndicator();

try{

const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify({action:"check_reminder"})})
});

const data=await res.json();

this.removeTyping();

if(data.notifications && data.notifications.length){

data.notifications.forEach(n=>{
let message="🔔 "+n.text+"\n"+n.reminder;
if(n.file){
message+="\n"+n.file;
}
this.addMessage(message,"bot reminder");
});

}else{

this.addMessage("Tidak ada memo","bot");

}

}catch(err){

this.removeTyping();
this.addMessage("Error cek notifikasi","bot");

}

this.isLoading=false;

},

saveChat(){
localStorage.setItem("ai_chat",this.chat.innerHTML);
},

loadChat(){
const saved=localStorage.getItem("ai_chat");
if(saved){
this.chat.innerHTML=saved;
this.rebindPopup();

/* AUTO SCROLL SAAT RELOAD */
setTimeout(()=>{
this.chat.scrollTop=this.chat.scrollHeight;
},100);

}
},

rebindPopup(){

const bubbles=this.chat.querySelectorAll(".message.bot .bubble");

bubbles.forEach(bubble=>{

bubble.style.cursor="pointer";

bubble.onclick=()=>{
this.openPopup(bubble.innerText);
};

});

},

clearChat(){
if(confirm("Yakin ingin menghapus semua chat?")){
localStorage.removeItem("ai_chat");
this.chat.innerHTML="";
}
}

};

AI.init();

</script>

</body>
</html>
