<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow-x:hidden;
}

/* BACKGROUND */

body{
  background:linear-gradient(135deg,#e0f7ff,#f5f9ff,#eef1ff);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* APP */

.app{
  width:100%;
  max-width:1000px;
  height:95vh;

  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);

  border-radius:28px;

  border:1px solid rgba(255,255,255,0.6);

  box-shadow:
  0 40px 80px rgba(0,0,0,0.10),
  0 10px 25px rgba(0,0,0,0.06);

  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */

header{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  padding:16px 20px;

  font-weight:600;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

header span{
  font-size:16px;
}

header button{

  background:rgba(255,255,255,0.18);

  border:1px solid rgba(255,255,255,0.35);

  padding:6px 14px;

  border-radius:18px;

  font-size:12px;

  cursor:pointer;

  color:white;
}

/* CHAT */

#chat{
  flex:1;
  overflow-y:auto;
  padding:24px;

  display:flex;
  flex-direction:column;
  gap:18px;
}

/* MESSAGE */

.message{
  display:flex;
  gap:10px;
  max-width:75%;
}

.message.user{
  align-self:flex-end;
  flex-direction:row-reverse;
}

/* AVATAR */

.avatar{
  width:36px;
  height:36px;

  border-radius:50%;

  background:linear-gradient(135deg,#00c6ff,#0072ff);

  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:12px;
  font-weight:bold;
}

.message.user .avatar{
  background:linear-gradient(135deg,#7c4dff,#512da8);
}

/* CHAT BUBBLE */

.bubble{

  padding:14px 16px;

  border-radius:16px;

  font-size:14px;

  line-height:1.6;

  background:#ffffff;

  border:1px solid #eef3ff;

  box-shadow:0 6px 14px rgba(0,0,0,0.05);

  white-space:pre-wrap;
}

.message.user .bubble{

  background:linear-gradient(135deg,#00c6ff,#0072ff);

  color:white;

  border:none;
}

/* TIMESTAMP */

.timestamp{
  font-size:10px;
  margin-top:5px;
  opacity:0.5;
}

/* INPUT AREA */

.input-area{

  padding:18px;

  border-top:1px solid #eef3ff;

  display:flex;
  flex-direction:column;
  gap:12px;

  background:#fbfdff;
}

/* INPUT */

select,
textarea,
input[type="file"],
input[type="datetime-local"]{

  width:100%;

  padding:12px;

  border-radius:14px;

  border:1px solid #e6efff;

  background:white;

  font-size:14px;
}

textarea{
  min-height:70px;
}

/* datetime fix */

input[type="datetime-local"]{
  height:42px;
}

/* ACTION BUTTONS */

.actions{
  display:flex;
  gap:10px;
}

button.action{

  flex:1;

  border:none;

  border-radius:20px;

  padding:12px;

  cursor:pointer;

  font-weight:600;

  color:white;

  font-size:13px;
}

.save-btn{
  background:linear-gradient(135deg,#26c6da,#00acc1);
}

.ask-btn{
  background:linear-gradient(135deg,#7c4dff,#5e35b1);
}

.check-btn{
  background:linear-gradient(135deg,#ffa726,#fb8c00);
}

/* SCROLL */

#chat::-webkit-scrollbar{
  width:6px;
}

#chat::-webkit-scrollbar-thumb{
  background:#d9e3ff;
  border-radius:10px;
}

/* ================= POPUP ================= */

.ai-popup{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.45);

  display:none;

  align-items:center;
  justify-content:center;

  z-index:9999;

  padding:18px;

  backdrop-filter:blur(8px);
}

.ai-popup-box{

  background:white;

  width:100%;
  max-width:680px;

  max-height:85vh;

  border-radius:20px;

  overflow:hidden;

  display:flex;
  flex-direction:column;
}

.ai-popup-close{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:14px 18px;

  border-bottom:1px solid #eef2f7;

  background:linear-gradient(135deg,#f7fbff,#eef6ff);

  font-size:14px;
  font-weight:600;
}

.ai-popup-close::before{
  content:"Detail Jawaban AI";
}

.ai-popup-close button{

  border:none;

  background:#e53935;

  color:white;

  padding:6px 12px;

  border-radius:8px;

  font-size:12px;

  cursor:pointer;
}

#aiPopupContent{

  padding:20px;

  overflow:auto;

  font-size:14px;

  line-height:1.7;

  color:#333;

  white-space:pre-wrap;
}

/* ================= MOBILE ================= */

@media (max-width:650px){

body{
  align-items:stretch;
}

.app{
  height:100vh;
  border-radius:0;
}

/* chat tidak melebar */

.message{
  max-width:90%;
}

#chat{
  padding:16px;
}

/* avatar kecil */

.avatar{
  width:32px;
  height:32px;
  font-size:11px;
}

/* tombol stack */

.actions{
  flex-direction:column;
}

button.action{
  width:100%;
}

/* popup mobile */

.ai-popup{
  padding:0;
}

.ai-popup-box{

  max-width:100%;
  max-height:100vh;

  height:100vh;

  border-radius:0;
}

}

</style>


</head>

<body>

<div class="app">

<header>
<span>🤖 AI Memory</span>
<button onclick="AI.clearChat()">Clear</button>
</header>

<div id="chat"></div>

<div class="input-area">

<select id="user">
<option value="none">Pilih User</option>
<option>QC-Bapro</option>
<option>QC-Cetak</option>
<option>QC-Finishing</option>
<option>QC-Lem</option>
<option>QC-SPV</option>
<option>QC-Manager</option>
</select>

<textarea id="text" placeholder="Tulis pertanyaan atau simpan data..."></textarea>

<input type="file" id="file" multiple>

<input type="datetime-local" id="reminder">

<div class="actions">
<button class="action save-btn" onclick="AI.save()">💾 Simpan</button>
<button class="action ask-btn" onclick="AI.ask()">🚀 Tanya</button>
<button class="action check-btn" onclick="AI.checkReminder()">🔔 Cek</button>
</div>

</div>
</div>

<!-- POPUP -->
<div class="ai-popup" id="aiPopup">
<div class="ai-popup-box">

<div class="ai-popup-close">
<button onclick="AI.closePopup()">Tutup</button>
</div>

<div id="aiPopupContent"></div>

</div>
</div>

<script>

const AI = {

URL:"https://script.google.com/macros/s/AKfycbwkTNFe_xT6b4lqMUKJD04Q44IV7oeIKXFBbTz7r8Xp9sIM8hmW18kty9ZDUotNOK9JZw/exec",
chat:document.getElementById("chat"),
text:document.getElementById("text"),
user:document.getElementById("user"),
file:document.getElementById("file"),
reminder:document.getElementById("reminder"),
isLoading:false,

init(){
this.loadChat();
},

formatText(text){
return text
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
},

addMessage(text,type){

const msg=document.createElement("div");
msg.className="message "+type;

const avatar=document.createElement("div");
avatar.className="avatar";
avatar.innerText= type==="user"?"U":"AI";

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.innerHTML=this.formatText(text);

if(type==="bot"){
bubble.style.cursor="pointer";
bubble.onclick=()=>this.openPopup(text);
}

const time=document.createElement("div");
time.className="timestamp";
time.innerText=new Date().toLocaleTimeString();

bubble.appendChild(time);
msg.appendChild(avatar);
msg.appendChild(bubble);

this.chat.appendChild(msg);
this.chat.scrollTop=this.chat.scrollHeight;
this.saveChat();
},

openPopup(text){
document.getElementById("aiPopupContent").innerHTML=this.formatText(text);
document.getElementById("aiPopup").style.display="flex";
},

closePopup(){
document.getElementById("aiPopup").style.display="none";
},

typingIndicator(){
const msg=document.createElement("div");
msg.className="message bot";
msg.id="typing";

const avatar=document.createElement("div");
avatar.className="avatar";
avatar.innerText="AI";

const bubble=document.createElement("div");
bubble.className="bubble";

const typing=document.createElement("div");
typing.className="typing";
typing.innerHTML="<span></span><span></span><span></span>";

bubble.appendChild(typing);
msg.appendChild(avatar);
msg.appendChild(bubble);

this.chat.appendChild(msg);
this.chat.scrollTop=this.chat.scrollHeight;
},

removeTyping(){
const t=document.getElementById("typing");
if(t) t.remove();
},

async toBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>resolve(reader.result);
reader.onerror=error=>reject(error);
});
},

async ask(){

if(this.isLoading) return;

const text=this.text.value.trim();

if(!text){
alert("Teks kosong");
return;
}

if(this.user.value==="none"){
alert("Pilih user dulu");
return;
}

this.isLoading=true;
this.addMessage(text,"user");
this.text.value="";
this.typingIndicator();

const payload={action:"ask",text:text};

try{
const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify(payload)})
});
const data=await res.json();
this.removeTyping();
this.addMessage(data.answer||"Tidak ada jawaban","bot");
}catch(err){
this.removeTyping();
this.addMessage("Server error","bot");
}

this.isLoading=false;
},

async save(){

if(this.isLoading) return;

const text=this.text.value.trim();

if(!text){
alert("Teks kosong");
return;
}

if(this.user.value==="none"){
alert("Pilih user dulu");
return;
}

this.isLoading=true;
this.typingIndicator();

let fileArray=[];

for(let f of this.file.files){
const base64=await this.toBase64(f);
fileArray.push({
fileName:f.name,
mimeType:f.type,
fileData:base64
});
}

const payload={
action:"add",
user:this.user.value,
text:text,
reminder:this.reminder.value,
files:fileArray
};

try{
const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify(payload)})
});
await res.json();

this.removeTyping();
this.addMessage("Data berhasil disimpan","bot");
this.text.value="";
this.reminder.value="";
this.file.value="";
}catch(err){
this.removeTyping();
this.addMessage("Gagal menyimpan","bot");
}

this.isLoading=false;
},

async checkReminder(){

if(this.isLoading) return;

this.isLoading=true;
this.typingIndicator();

try{

const res=await fetch(this.URL,{
method:"POST",
body:new URLSearchParams({payload:JSON.stringify({action:"check_reminder"})})
});

const data=await res.json();

this.removeTyping();

if(data.notifications && data.notifications.length){

data.notifications.forEach(n=>{
let message="🔔 "+n.text+"\n"+n.reminder;
if(n.file){
message+="\n"+n.file;
}
this.addMessage(message,"bot");
});

}else{

this.addMessage("Tidak ada notifikasi","bot");

}

}catch(err){

this.removeTyping();
this.addMessage("Error cek notifikasi","bot");

}

this.isLoading=false;

},

saveChat(){
localStorage.setItem("ai_chat",this.chat.innerHTML);
},

loadChat(){
const saved=localStorage.getItem("ai_chat");
if(saved){
this.chat.innerHTML=saved;
this.rebindPopup();
}
},

rebindPopup(){

const bubbles=this.chat.querySelectorAll(".message.bot .bubble");

bubbles.forEach(bubble=>{

bubble.style.cursor="pointer";

bubble.onclick=()=>{
this.openPopup(bubble.innerText);
};

});

},

clearChat(){
if(confirm("Yakin ingin menghapus semua chat?")){
localStorage.removeItem("ai_chat");
this.chat.innerHTML="";
}
}

};

AI.init();

</script>

</body>
</html>
